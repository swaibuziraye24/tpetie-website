<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Petie Beauty Center</title>

<link rel="manifest" href="manifest.json">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.topbar{
background:#ff9900;color:white;
display:flex;justify-content:space-between;
padding:10px;position:sticky;top:0;z-index:1000;
}

.search{width:50%;padding:8px;border:none;border-radius:5px;}

.hero{height:200px;background:url("banner.jpg") center/cover;margin:10px;border-radius:10px;}

.categories{display:flex;gap:10px;overflow-x:auto;padding:10px;background:#fff;}
.categories button{padding:8px;border:none;border-radius:20px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;padding:10px;
}

.product{
background:white;padding:10px;border-radius:8px;text-align:center;
}

.product img{width:100%;height:140px;object-fit:cover;}

.price{color:orange;font-weight:bold;}

button{background:#ff6600;color:white;border:none;padding:8px;width:100%;margin-top:5px;}

#cart-box{
position:fixed;right:0;top:0;width:300px;height:100%;
background:white;display:none;padding:10px;overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
<h3>T-Petie</h3>
<input class="search" placeholder="Search..." onkeyup="searchProducts(this.value)">
<span onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</span>
</div>

<div class="hero"></div>

<div class="categories">
<button onclick="filter('all')">All</button>
<button onclick="filter('perfume')">Perfume</button>
<button onclick="filter('cosmetics')">Cosmetics</button>
<button onclick="filter('bags')">Bags</button>
</div>

<!-- ADMIN -->
<div style="background:#fff;margin:10px;padding:10px;">
<h3>Admin Add Product</h3>
<input id="name" placeholder="Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="image" placeholder="Image URL"><br><br>

<select id="category">
<option value="perfume">Perfume</option>
<option value="cosmetics">Cosmetics</option>
<option value="bags">Bags</option>
</select><br><br>

<button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="product-list"></div>

<!-- CART -->
<div id="cart-box">
<h3>Cart</h3>
<div id="cart-items"></div>
<h3>Total: UGX <span id="total">0</span></h3>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
where,
updateDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.fb={collection,addDoc,getDocs,deleteDoc,doc,query,where,updateDoc,serverTimestamp};
</script>

<!-- APP -->
<script>
let cart=[];

/* CART */
function addToCart(n,p){
let i=cart.find(x=>x.name===n);
i?i.qty++:cart.push({name:n,price:p,qty:1});
updateCart();
}

function updateCart(){
let box=document.getElementById("cart-items");
let total=0;
box.innerHTML="";

cart.forEach((i,idx)=>{
total+=i.price*i.qty;
box.innerHTML+=`
<p>${i.name} x${i.qty} = ${i.price*i.qty}
<button onclick="change(${idx},1)">+</button>
<button onclick="change(${idx},-1)">-</button>
</p>`;
});

document.getElementById("total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0)cart.splice(i,1);
updateCart();
}

function toggleCart(){
let b=document.getElementById("cart-box");
b.style.display=b.style.display==="block"?"none":"block";
}

/* FILTER */
function filter(c){
document.querySelectorAll(".product").forEach(p=>{
p.style.display=(c==="all"||p.classList.contains(c))?"block":"none";
});
}

/* SEARCH */
function searchProducts(q){
q=q.toLowerCase();
document.querySelectorAll(".product").forEach(p=>{
let n=p.querySelector("h3").innerText.toLowerCase();
p.style.display=n.includes(q)?"block":"none";
});
}

/* ADD PRODUCT */
async function addProduct(){
await window.fb.addDoc(window.fb.collection(window.db,"products"),{
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
image:document.getElementById("image").value,
category:document.getElementById("category").value,
createdAt:window.fb.serverTimestamp()
});
loadProducts();
}

/* LOAD PRODUCTS */
async function loadProducts(){
let box=document.getElementById("product-list");
box.innerHTML="";

let snap=await window.fb.getDocs(
window.fb.collection(window.db,"products")
);

if(snap.empty){
box.innerHTML="<p>No products available</p>";
return;
}

snap.forEach(d=>{
let p=d.data();

box.innerHTML+=`
<div class="product ${p.category}">
<img src="${p.image}">
<h3>${p.name}</h3>
<p class="price">UGX ${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}

/* INIT */
function start(){
updateCart();
loadProducts();
}

window.addEventListener("load",start);
</script>

</body>
</html>
