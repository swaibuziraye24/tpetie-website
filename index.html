<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Petie Beauty</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<style>

    body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

.topbar {
    background:#ff9900;
    padding:10px;
    display:flex;
    justify-content:space-between;
    color:white;
}

.hero {
    height:200px;
    background:url('banner.jpg') center/cover;
    margin:10px;
    border-radius:10px;
}

.categories {
    display:flex;
    overflow:auto;
    padding:10px;
    gap:10px;
    background:white;
}

.categories button {
    padding:8px;
    border:none;
    border-radius:20px;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap:10px;
    padding:10px;
}

.product {
    background:white;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

.product img {
    width:100%;
    height:140px;
    object-fit:cover;
}

#cart-box {
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:white;
    display:none;
    padding:10px;
}

</style>

<!-- TOP BAR -->
<div class="topbar">
    <h2>T-Petie</h2>
    <input type="text" placeholder="Search..." onkeyup="searchProducts(this.value)">
    <span onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</span>
</div>

<!-- HERO -->
<div class="hero"></div>

<!-- CATEGORY -->
<div class="categories">
    <button onclick="filterProducts('all')" class="active">All</button>
    <button onclick="filterProducts('perfume')">Perfumes</button>
    <button onclick="filterProducts('cosmetics')">Cosmetics</button>
    <button onclick="filterProducts('bags')">Bags</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

    <div class="product perfume">
        <img src="perfume.jpg">
        <h3>Luxury Perfume</h3>
        <p>UGX 80,000</p>
        <button onclick="addToCart('Luxury Perfume',80000)">Add</button>
    </div>

    <div class="product cosmetics">
        <img src="cosmetics.jpg">
        <h3>Makeup Kit</h3>
        <p>UGX 120,000</p>
        <button onclick="addToCart('Makeup Kit',120000)">Add</button>
    </div>

</div>

<!-- CART -->
<div id="cart-box">
    <h2>Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: UGX <span id="cart-total">0</span></h3>

    <button onclick="checkout()">Checkout WhatsApp</button>
    <button onclick="payNow()">Pay Now</button>
</div>

<script src="app.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ADD TO CART
function addToCart(name, price){
    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    saveCart();
    updateCart();
}

// SAVE
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

// UPDATE CART
function updateCart(){
    let items = document.getElementById("cart-items");
    let totalEl = document.getElementById("cart-total");
    let count = document.getElementById("cart-count");

    if(!items) return;

    items.innerHTML = "";
    let total = 0;

    cart.forEach((item,i)=>{
        let t = item.price * item.qty;
        total += t;

        items.innerHTML += `
        <p>
        ${item.name} x${item.qty} - UGX ${t}
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
        </p>`;
    });

    totalEl.innerText = total;
    count.innerText = cart.length;
}

// CHANGE QTY
function changeQty(i,val){
    cart[i].qty += val;
    if(cart[i].qty <= 0) cart.splice(i,1);

    saveCart();
    updateCart();
}

// TOGGLE CART
function toggleCart(){
    let box = document.getElementById("cart-box");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

// FILTER
function filterProducts(cat){
    document.querySelectorAll(".product").forEach(p=>{
        p.style.display = (cat==="all" || p.classList.contains(cat)) ? "block":"none";
    });
}

// SEARCH
function searchProducts(q){
    q = q.toLowerCase();

    document.querySelectorAll(".product").forEach(p=>{
        let name = p.querySelector("h3").innerText.toLowerCase();
        p.style.display = name.includes(q) ? "block":"none";
    });
}

// WHATSAPP CHECKOUT
function checkout(){
    let phone="2567XXXXXXXX"; // PUT REAL NUMBER
    let msg="🛍 T-Petie Beauty Order:\n";

    let total=0;

    cart.forEach(item=>{
        let t=item.price*item.qty;
        total+=t;
        msg+=`- ${item.name} x${item.qty} = UGX ${t}\n`;
    });

    msg+=`\nTotal: UGX ${total}`;

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

// SLIDER AUTO
setInterval(()=>{
    let sliders = document.querySelectorAll(".slider");

    sliders.forEach(slider=>{
        let imgs = slider.querySelectorAll("img");
        if(imgs.length === 0) return;

        let index = [...imgs].findIndex(img=>img.classList.contains("active"));

        imgs[index].classList.remove("active");
        imgs[(index+1)%imgs.length].classList.add("active");
    });

},3000);

// INIT
updateCart();
</script>

</body>
</html>
