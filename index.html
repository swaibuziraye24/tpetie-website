<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Petie Beauty Center</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* TOP BAR */
.topbar {
    background: #ff9900;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.search {
    width: 50%;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

/* HERO */
.hero {
    background: url("banner.jpg") center/cover;
    height: 250px;
    margin: 10px;
    border-radius: 10px;
}

/* CATEGORIES */
.categories {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: white;
}

.categories button {
    padding: 8px 12px;
    border: none;
    border-radius: 20px;
    background: #eee;
    cursor: pointer;
    font-size: 14px;
}

.categories button.active {
    background: #ff9900;
    color: white;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 15px;
    padding: 10px;
}

.product {
    background: white;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #eee;
    transition: 0.3s;
    position: relative;
}

.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.price {
    color: #ff9900;
    font-weight: bold;
    font-size: 18px;
}

.product button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    margin-top: 5px;
    font-weight: bold;
}

/* CART */
#cart-box {
    position: fixed;
    right: 0;
    top: 0;
    width: 300px;
    height: 100%;
    background: white;
    padding: 15px;
    display: none;
    overflow-y: auto;
}

/* SLIDER */
.slider img {
    width: 100%;
    display: none;
    border-radius: 10px;
}

.slider img.active {
    display: block;
}

/* POPUP */
#popup {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>T-Petie</h2>

    <input class="search" placeholder="Search products..."
    onkeyup="searchProducts(this.value)">

    <span onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</span>
</div>

<!-- HERO -->
<div class="hero"></div>

<!-- CATEGORIES -->
<div class="categories">
    <button onclick="filterProducts('all')" class="active">All</button>
    <button onclick="filterProducts('perfume')">Perfumes</button>
    <button onclick="filterProducts('cosmetics')">Cosmetics</button>
    <button onclick="filterProducts('bags')">Bags</button>
</div>

<!-- ADMIN ADD PRODUCT -->
<div style="padding:10px;background:#fff;margin:10px;border-radius:10px;">
<h3>Add Product (Admin)</h3>

<input id="p-name" placeholder="Product name"><br><br>
<input id="p-price" placeholder="Price"><br><br>
<input id="p-image" placeholder="Image file"><br><br>

<select id="p-category">
<option value="perfume">Perfume</option>
<option value="cosmetics">Cosmetics</option>
<option value="bags">Bags</option>
</select><br><br>

<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="product-list">

    <div class="product perfume">
        <img src="perfume1.jpg">
        <h3>Chanel Perfume</h3>
        <p class="price">UGX 150,000</p>
        <button onclick="addToCart('Chanel Perfume',150000)">Add</button>
    </div>

    <div class="product cosmetics">
        <img src="cosmetics1.jpg">
        <h3>Full Makeup Kit</h3>
        <p class="price">UGX 120,000</p>
        <button onclick="addToCart('Full Makeup Kit',120000)">Add</button>
    </div>

    <div class="product bags">
        <img src="bag1.jpg">
        <h3>Luxury Handbag</h3>
        <p class="price">UGX 95,000</p>
        <button onclick="addToCart('Luxury Handbag',95000)">Add</button>
    </div>

</div>

<!-- SLIDER -->
<div class="slider">
    <img src="perfume1.jpg" class="active">
    <img src="perfume2.jpg">
    <img src="perfume3.jpg">
</div>

<!-- CART -->
<div id="cart-box">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: UGX <span id="cart-total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
    <button onclick="payNow()">Pay Now</button>
</div>

<!-- POPUP -->
<div id="popup">
<div style="background:white;padding:20px;border-radius:10px;width:300px;">
    <h3 id="popup-name"></h3>
    <p id="popup-price"></p>
    <button onclick="closePopup()">Close</button>
</div>
</div>

<!-- MAP -->
<div id="map" style="height:300px;margin:10px;"></div>

<!-- AUTH -->
<div id="auth-box" style="padding:15px;background:#fff;margin:10px;border-radius:10px;">
<h3>Account</h3>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="user-status"></p>
</div>

<!-- ORDERS -->
<div style="padding:10px;">
<h3>My Orders</h3>
<div id="orders"></div>
</div>

<!-- ADMIN ORDERS -->
<div style="padding:10px;background:#fff;margin:10px;border-radius:10px;">
<h2>Admin Dashboard</h2>
<div id="admin-orders"></div>
</div>

<!-- FIREBASE (MODERN ONLY ONCE) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
window.auth = getAuth(app);
window.db = getFirestore(app);

window.fb = {
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
collection,
addDoc,
getDocs,
query,
where,
updateDoc,
doc,
serverTimestamp
};
</script>

<!-- MAIN JS -->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
let item = cart.find(i=>i.name===name);
if(item) item.qty++;
else cart.push({name,price,qty:1});
saveCart(); updateCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function updateCart(){
let items=document.getElementById("cart-items");
let total=0;
items.innerHTML="";

cart.forEach((i,index)=>{
let t=i.price*i.qty;
total+=t;

items.innerHTML+=`
<p>${i.name} x${i.qty} = ${t}
<button onclick="changeQty(${index},1)">+</button>
<button onclick="changeQty(${index},-1)">-</button>
</p>`;
});

document.getElementById("cart-total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;
}

function changeQty(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
saveCart(); updateCart();
}

function toggleCart(){
let box=document.getElementById("cart-box");
box.style.display=box.style.display==="block"?"none":"block";
}

function filterProducts(cat){
document.querySelectorAll(".product").forEach(p=>{
p.style.display=(cat==="all"||p.classList.contains(cat))?"block":"none";
});
}

function searchProducts(q){
q=q.toLowerCase();
document.querySelectorAll(".product").forEach(p=>{
let name=p.querySelector("h3").innerText.toLowerCase();
p.style.display=name.includes(q)?"block":"none";
});
}

setInterval(()=>{
let imgs=document.querySelectorAll(".slider img");
let i=[...imgs].findIndex(x=>x.classList.contains("active"));
imgs[i].classList.remove("active");
imgs[(i+1)%imgs.length].classList.add("active");
},3000);

function addProduct(){
let name=p-name.value;
let price=p-price.value;
let image=p-image.value;
let cat=p-category.value;

document.getElementById("product-list").innerHTML+=`
<div class="product ${cat}">
<img src="${image}">
<h3>${name}</h3>
<p class="price">UGX ${price}</p>
<button onclick="addToCart('${name}',${price})">Add</button>
</div>`;
}

function checkout(){
let phone="2567XXXXXXXX";
let msg="Order:\n";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
msg+=`${i.name} x${i.qty} = ${i.price*i.qty}\n`;
});

msg+=`\nTOTAL: ${total}`;
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

function payNow(){
alert("Flutterwave integration stays same here");
}

updateCart();
</script>

</body>
</html>
